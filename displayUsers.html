<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Users</title>
</head>
<body>
    <h1>User Info:</h1>
    <div id="displayUsers"></div>


    <script>
        let getPeopleData = null

        async function getJson(path) {
            const res = await fetch(path);
            const convertedJson = await res.json();
            return convertedJson
        };

        function renderUser(data, index) {
            return `
            <div>
                <strong>Name: </strong> ${data.Name} </br>
                <strong>ID: </strong> ${data.ID} </br>
                <strong>Age: </strong> ${data.Age} </br>
                <strong>Gender: </strong> ${data.Gender} </br>
                <strong>Education: </strong> ${data.Education} </br>
                <strong>Address: </strong> ${data.Address} </br>
            </div>
            <div>
                <button onclick="greetButton(${index})">Greet</button>
            </div>
            <hr/>
            `
        }
        function greetButton(num){
            console.log(typeof num)
            console.log(getPeopleData)
            const currentData = getPeopleData[num]
            alert (`greetings from ${currentData.Name}`)
        }
        async function main() {
            getPeopleData = await getJson('peopleData.json');
            console.log(getPeopleData);
            
            const displayUserContainer = document.getElementById('displayUsers');
            for (let index = 0; index < getPeopleData.length; index++) {
                const element = getPeopleData[index];
                const userData = renderUser(element, index);
                displayUserContainer.innerHTML += userData;
            }
            
            
        }
        main()


    </script>
    
</body>
</html>
